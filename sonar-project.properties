sonar.projectKey=final-project-ncc-kel3
sonar.projectName=Final Project NCC Kel3
sonar.projectVersion=1.0
sonar.sourceEncoding=UTF-8

# Single source root — no modules, scan everything from repo root
sonar.sources=services
sonar.exclusions=**/node_modules/**,**/.git/**,**/vendor/**,**/__pycache__/**,**/.next/**

# Coverage reports
sonar.go.coverage.reportPaths=services/api/coverage.out
sonar.python.coverage.reportPaths=services/rule-engine/test-results/coverage.xml
sonar.javascript.lcov.reportPaths=services/frontend/coverage/lcov.info
