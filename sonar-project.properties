# ============================================================
# sonar-project.properties
# Place this file at the repository root.
# ============================================================

sonar.projectKey=final-project-ncc-kel3
sonar.projectName=Final Project NCC Kel3 - Llama Chat + SIEM
sonar.projectVersion=1.0

# -------------------------------------------------------
# Source paths
# -------------------------------------------------------
sonar.sources=services,frontend

# -------------------------------------------------------
# Test paths
# -------------------------------------------------------
sonar.tests=services,frontend

# Include test files using glob patterns
sonar.test.inclusions=\
  **/*_test.go,\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.spec.ts,\
  **/*.spec.tsx

# -------------------------------------------------------
# Exclusions (build artefacts, generated files, node_modules)
# -------------------------------------------------------
sonar.exclusions=\
  **/node_modules/**,\
  **/.next/**,\
  **/dist/**,\
  **/coverage/**,\
  **/vendor/**,\
  **/*.pb.go,\
  **/database/**,\
  **/nginx/**,\
  **/scripts/**,\
  **/metrics/**

sonar.coverage.exclusions=\
  **/node_modules/**,\
  **/.next/**,\
  **/dist/**,\
  **/coverage/**,\
  **/vendor/**,\
  **/*.pb.go

# -------------------------------------------------------
# Go – coverage report
# Generated by:  go test -coverprofile=coverage.out ./...
# Then convert:  go tool cover -func=coverage.out
# SonarQube reads the raw coverprofile directly.
# -------------------------------------------------------
sonar.go.coverage.reportPaths=\
  services/api/coverage.out,\
  services/log-collector/coverage.out,\
  services/log-parser/coverage.out

# -------------------------------------------------------
# TypeScript / JavaScript
# -------------------------------------------------------
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info

# -------------------------------------------------------
# Language hints
# -------------------------------------------------------
sonar.language=
# Leave blank so SonarQube auto-detects Go + TypeScript/TSX

# -------------------------------------------------------
# Encoding
# -------------------------------------------------------
sonar.sourceEncoding=UTF-8

# -------------------------------------------------------
# SonarQube server (overridden by Jenkins env vars;
# keep as fallback for local sonar-scanner runs)
# -------------------------------------------------------
# sonar.host.url=http://localhost:9000/sonarqube
# sonar.login=<your-token>
