global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    metrics_path: /prometheus/metrics
    static_configs:
      - targets: ["prometheus:9090"]
        labels:
          instance: "prometheus"

  - job_name: "node"
    static_configs:
      - targets: ["node_exporter:9100"]
        labels:
          instance: "prometheus-host"

rule_files:
  - /etc/prometheus/alert.rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]