services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_PORT: "80"
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?sslmode=disable
      JWT_SECRET: ${JWT_SECRET}
      JWT_TTL_MINUTES: ${JWT_TTL_MINUTES}
      DB_MAX_OPEN_CONNS: ${DB_MAX_OPEN_CONNS}
      DB_MAX_IDLE_CONNS: ${DB_MAX_IDLE_CONNS}
      DB_CONN_MAX_LIFETIME_MINUTES: ${DB_CONN_MAX_LIFETIME_MINUTES}
      RATE_LIMIT_RPS: ${RATE_LIMIT_RPS}
      RATE_LIMIT_BURST: ${RATE_LIMIT_BURST}
      ALLOWED_ORIGIN: https://${DOMAIN:-localhost}
      LLM_BASE_URL: ${LLM_BASE_URL:-http://model-runner.docker.internal:12434/engines/v1}
      LLM_MODEL: ${LLM_MODEL_NAME:-hf.co/bartowski/Llama-3.2-3B-Instruct-GGUF:Q6_K}
      LLM_CTX_SIZE: ${LLM_CTX_SIZE:-4096}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS}
    extra_hosts:
      - "model-runner.docker.internal:host-gateway"
    volumes:
      - app-logs:/app/logs
    ports:
      - "${BACKEND_HOST_BIND:-127.0.0.1}:${BACKEND_HOST_PORT:-8000}:80"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-}
      HOSTNAME: 0.0.0.0
    ports:
      - "${FRONTEND_HOST_BIND:-127.0.0.1}:${FRONTEND_HOST_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "nginx -t"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  log-collector:
    build:
      context: ./services/log-collector
      dockerfile: Dockerfile
    image: ${REGISTRY:-local}/siem-log-collector:${TAG:-latest}
    container_name: siem_log_collector
    restart: unless-stopped
    env_file: .env
    environment:
      SERVICE_NAME: log-collector
      LOG_LEVEL: ${LOG_LEVEL:-info}
      POSTGRES_DSN: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      RELOAD_INTERVAL_SECONDS: ${COLLECTOR_RELOAD_INTERVAL:-30}
    volumes:
      - ${WATCHED_LOG_DIR:-/var/log}:/watched-logs:ro
      - app-logs:/app-logs:ro
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/healthy"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 75s

  log-parser:
    build:
      context: ./services/log-parser
      dockerfile: Dockerfile
    image: ${REGISTRY:-local}/siem-log-parser:${TAG:-latest}
    container_name: siem_log_parser
    restart: unless-stopped
    env_file: .env
    environment:
      SERVICE_NAME: log-parser
      LOG_LEVEL: ${LOG_LEVEL:-info}
      POSTGRES_DSN: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      POLL_INTERVAL_MS: ${PARSER_POLL_INTERVAL_MS:-500}
    depends_on:
      log-collector:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/healthy"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 90s

  siem-api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    image: ${REGISTRY:-local}/siem-api:${TAG:-latest}
    container_name: siem_api
    restart: unless-stopped
    env_file: .env
    environment:
      SERVICE_NAME: siem-api
      PORT: "8080"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      POSTGRES_DSN: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      WS_POLL_INTERVAL_MS: ${WS_POLL_INTERVAL_MS:-500}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-*}
    ports:
      - "${SIEM_API_HOST_BIND:-127.0.0.1}:${SIEM_API_HOST_PORT:-8080}:8080"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 20s

volumes:
  pgdata:
  app-logs:
